    <style>
        /* --- VARIABLES DE COLOR (NEGRO & ROJO) --- */
        :root {
            --bg-principal: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1f1f1f;
            --rojo-primario: #dc2626;
            --rojo-hover: #ef4444; 
            --texto-blanco: #ffffff;
            --texto-gris: #a1a1aa;
            --borde-color: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            padding: 20px;
            line-height: 1.5;
        }

        /* --- HEADER Y LOGO --- */
        header {
            text-align: center;
            margin-bottom: 35px;
            padding: 30px 20px;
            background: radial-gradient(circle at center, #1f0505 0%, #0a0a0a 100%);
            border-radius: 16px;
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: 0 4px 25px rgba(220, 38, 38, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(220, 38, 38, 0.4));
        }

        /* BARRA DE REDES SOCIALES Y WHATSAPP */
        .social-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin: 5px 0;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 1px solid var(--borde-color);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            padding: 8px;
        }

        .social-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .social-link:hover, .social-link:active {
            transform: translateY(-3px) scale(1.08);
            border-color: var(--rojo-primario);
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }

        header p {
            color: var(--texto-gris);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 500;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .catalogo-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- TARJETA DE PRODUCTO --- */
        .producto-card {
            background-color: var(--bg-card);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--borde-color);
            position: relative;
        }

        .producto-card:hover {
            transform: translateY(-6px);
            border-color: var(--rojo-primario);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.25);
        }

        .badge-encargo {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, var(--rojo-primario) 0%, #991b1b 100%);
            color: #fff;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 6px;
            text-transform: uppercase;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            letter-spacing: 0.8px;
        }

        /* --- CONTENEDOR DE IMÁGENES Y TRANSICIONES --- */
        .imagen-wrapper {
            width: 100%;
            height: 380px;
            position: relative;
            overflow: hidden;
            background-color: #050505;
            cursor: pointer;
            padding: 10px;
        }

        .imagen-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s ease-in-out;
            will-change: opacity;
        }

        .imagen-wrapper img.atras {
            opacity: 0;
        }

        /* Cambia a la imagen trasera al pasar el mouse en PC */
        @media (hover: hover) {
            .producto-card:hover .imagen-wrapper img.adelante {
                opacity: 0;
            }
            .producto-card:hover .imagen-wrapper img.atras {
                opacity: 1;
            }
        }

        /* --- INFORMACIÓN DE LA CAMISETA --- */
        .info-wrapper {
            padding: 18px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .titulo-producto {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--texto-blanco);
            font-weight: 600;
            text-transform: capitalize;
        }

        .tallas {
            font-size: 0.85rem;
            color: var(--texto-gris);
            margin-bottom: 15px;
        }

        .tallas span {
            background-color: #27272a;
            color: var(--texto-blanco);
            padding: 3px 8px;
            border-radius: 4px;
            margin-right: 4px;
            font-weight: 600;
            border: 1px solid #3f3f46;
            display: inline-block;
            margin-bottom: 4px;
        }

        .btn-ordenar {
            background: linear-gradient(135deg, var(--rojo-primario) 0%, #b91c1c 100%);
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.88rem;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.3);
            border: none;
            text-align: center;
            margin-top: auto;
        }

        .btn-ordenar:hover {
            background: var(--rojo-hover);
            transform: scale(1.04);
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            header { padding: 20px 10px; gap: 12px; }
            .logo-img { max-width: 150px; }
            .social-bar { gap: 12px; }
            .social-link { width: 40px; height: 40px; padding: 7px; }
            .catalogo-container { grid-template-columns: 1fr; gap: 20px; }
            .imagen-wrapper { height: 380px; }
        }
    </style>
