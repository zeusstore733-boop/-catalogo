<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tu Camiseta CR — Catálogo Oficial</title>

    <!-- Precarga optimizada para redes lentas (3G/H+) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>

    <!-- Fancybox CSS con respaldo por si la red bloquea el CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" onerror="this.remove()"/>

    <style>
        :root {
            --bg-principal: #0a0a0a;
            --bg-card: #141414;
            --rojo-primario: #dc2626;
            --texto-blanco: #ffffff;
            --texto-gris: #a1a1aa;
            --borde-color: #27272a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            -webkit-font-smoothing: antialiased;
        }

        body {
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            line-height: 1.4;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 20px 15px;
            background: radial-gradient(circle at center, #1f0505 0%, #0a0a0a 100%);
            border-radius: 14px;
            border: 1px solid rgba(220, 38, 38, 0.3);
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .logo-img {
            max-width: 160px;
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        header p {
            color: var(--texto-gris);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .catalogo-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .producto-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--borde-color);
            position: relative;
        }

        .badge-encargo {
            position: absolute;
            top: 10px;
            left: 10px;
            background: linear-gradient(135deg, var(--rojo-primario) 0%, #991b1b 100%);
            color: #fff;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 700;
            border-radius: 4px;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }

        .imagen-wrapper {
            width: 100%;
            height: 340px;
            position: relative;
            overflow: hidden;
            background-color: #050505;
            cursor: pointer;
            touch-action: manipulation;
        }

        .imagen-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.25s ease-in-out;
        }

        .imagen-wrapper img.atras {
            opacity: 0;
        }

        @media (hover: hover) and (pointer: fine) {
            .producto-card:hover .imagen-wrapper img.adelante {
                opacity: 0;
            }
            .producto-card:hover .imagen-wrapper img.atras {
                opacity: 1;
            }
        }

        .info-wrapper {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .titulo-producto {
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: var(--texto-blanco);
            font-weight: 600;
        }

        .tallas {
            font-size: 0.8rem;
            color: var(--texto-gris);
            margin-bottom: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tallas span {
            background-color: #27272a;
            color: var(--texto-blanco);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            border: 1px solid #3f3f46;
        }

        .btn-ordenar {
            background: linear-gradient(135deg, var(--rojo-primario) 0%, #b91c1c 100%);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            text-align: center;
            margin-top: auto;
            display: block;
            width: 100%;
            touch-action: manipulation;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            header { padding: 15px 10px; margin-bottom: 15px; }
            .catalogo-container { grid-template-columns: 1fr; gap: 15px; }
            .imagen-wrapper { height: 320px; }
        }
    </style>
</head>

        ];

        const catalogo = document.getElementById('catalogo');
        const fragment = document.createDocumentFragment();

        camisetas.forEach(item => {
            const card = document.createElement('div');
            card.className = 'producto-card';
            
            const badge = item.encargo ? `<div class="badge-encargo">Bajo Encargo</div>` : '';
            const htmlTallas = item.tallas && item.tallas.length > 0 
                ? `<div class="tallas">Tallas: ${item.tallas.map(t => `<span>${t}</span>`).join('')}</div>` 
                : '';

            card.innerHTML = `
                ${badge}
                <div class="imagen-wrapper" data-fancybox="${item.id}" data-src="${encodeURI(item.frente)}">
                    <img src="${encodeURI(item.frente)}" alt="${item.nombre} Frente" class="adelante" loading="lazy">
                    <img src="${encodeURI(item.atras)}" alt="${item.nombre} Atras" class="atras" loading="lazy">
                    <a href="${encodeURI(item.atras)}" data-fancybox="${item.id}" style="display:none;"></a>
                </div>
                <div class="info-wrapper">
                    <h2 class="titulo-producto">${item.nombre}</h2>
                    ${htmlTallas}
                    <a href="https://wa.me/50663981769?text=Hola!%20Me%20interesa%20la%20camiseta%20de%20${encodeURIComponent(item.nombre)}" target="_blank" rel="noopener noreferrer" class="btn-ordenar">Pedir ya</a>
                </div>
            `;
            fragment.appendChild(card);
        });

        catalogo.appendChild(fragment);

        // Control de errores de red para Fancybox en conexiones 3G/H
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (typeof Fancybox !== "undefined") {
                    Fancybox.bind("[data-fancybox]", {
                        Images: { Panzoom: { maxScale: 3 } },
                        Toolbar: { display: { left: ["infobar"], right: ["close"] } }
                    });
                } else {
                    // Fallback nativo: Si la red bloquea el CDN, abre la imagen directamente en pestaña nueva al tocarla
                    document.querySelectorAll('.imagen-wrapper').forEach(wrapper => {
                        wrapper.addEventListener('click', () => {
                            const src = wrapper.getAttribute('data-src');
                            if (src) window.open(src, '_blank');
                        });
                    });
                }
            }, 300);
        });
    </script>
